<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦑 Quiz de Ciências – 7º Ano</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #1b2b22;
    --mid: #2d6a4f;
    --light: #52b788;
    --pale: #d8f3dc;
    --yellow: #f4d03f;
    --red: #e74c3c;
    --white: #f9fafb;
    --radius: 18px;
    --shadow: 0 8px 32px rgba(44,106,79,0.13);

    --fs-title:        clamp(1.6rem, 5vw, 3rem);
    --fs-sub:          clamp(1rem, 3vw, 1.5rem);
    --fs-topic:        clamp(0.75rem, 2vw, 1rem);
    --fs-question:     clamp(1.1rem, 3.2vw, 1.85rem);
    --fs-option:       clamp(1rem, 2.6vw, 1.45rem);
    --fs-feedback:     clamp(0.9rem, 2.2vw, 1.25rem);
    --fs-btn:          clamp(1rem, 2.8vw, 1.6rem);
    --fs-counter:      clamp(0.85rem, 2vw, 1.1rem);
    --fs-score:        clamp(3rem, 10vw, 5rem);
    --fs-result-title: clamp(1.4rem, 4vw, 2.4rem);
    --fs-stars:        clamp(1.8rem, 5vw, 2.5rem);

    --card-pad:    clamp(20px, 4vw, 48px);
    --gap:         clamp(10px, 2vw, 16px);
    --letter-size: clamp(34px, 6vw, 44px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1b2b22 0%, #2d6a4f 60%, #52b788 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 3vw, 24px);
  }

  #app {
    width: 100%;
    max-width: min(980px, 100%);
  }

  /* TELA INICIAL */
  #screen-intro {
    text-align: center;
    color: var(--white);
    animation: fadeIn 0.6s ease;
    padding: clamp(16px, 4vw, 40px);
  }

  .squid-icon {
    font-size: clamp(52px, 10vw, 88px);
    line-height: 1;
    margin-bottom: 12px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }

  #screen-intro h1 {
    font-family: 'Playfair Display', serif;
    font-size: var(--fs-title);
    line-height: 1.15;
    margin-bottom: 8px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  #screen-intro .turma {
    font-size: var(--fs-sub);
    opacity: 0.88;
    margin-bottom: 8px;
  }

  .intro-themes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: clamp(24px, 5vw, 36px);
  }

  .theme-pill {
    background: rgba(255,255,255,0.15);
    color: var(--white);
    font-size: var(--fs-topic);
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 100px;
    border: 1.5px solid rgba(255,255,255,0.3);
  }

  .prof-name {
    font-size: clamp(0.85rem, 2.5vw, 1.2rem);
    color: var(--white);
    opacity: 0.7;
    font-weight: 700;
    margin-bottom: 28px;
  }

  .btn-start {
    background: var(--yellow);
    color: var(--dark);
    border: none;
    border-radius: 50px;
    padding: clamp(14px, 3vw, 20px) clamp(32px, 7vw, 60px);
    font-family: 'Nunito', sans-serif;
    font-size: var(--fs-btn);
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-start:hover  { transform: scale(1.06); }
  .btn-start:active { transform: scale(0.97); }

  /* TELA QUIZ */
  #screen-quiz { animation: fadeIn 0.5s ease; }

  .q-counter {
    color: rgba(255,255,255,0.8);
    font-size: var(--fs-counter);
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.18);
    border-radius: 50px;
    height: clamp(7px, 1.5vw, 10px);
    margin-bottom: clamp(14px, 3vw, 24px);
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--yellow);
    border-radius: 50px;
    transition: width 0.5s ease;
  }

  /* CARD */
  .card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: var(--card-pad);
  }

  .q-label {
    font-size: var(--fs-topic);
    font-weight: 700;
    color: var(--mid);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: clamp(10px, 2vw, 14px);
  }

  .q-text {
    font-size: var(--fs-question);
    font-weight: 700;
    color: var(--dark);
    line-height: 1.4;
    margin-bottom: clamp(18px, 4vw, 32px);
  }

  /* ALTERNATIVAS */
  .options {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--gap);
  }

  @media (min-width: 640px) {
    .options { grid-template-columns: 1fr 1fr; }
  }

  .option {
    display: flex;
    align-items: center;
    gap: clamp(10px, 2vw, 16px);
    background: var(--pale);
    border: 3px solid transparent;
    border-radius: 14px;
    padding: clamp(12px, 2.5vw, 20px) clamp(14px, 3vw, 24px);
    font-family: 'Nunito', sans-serif;
    font-size: var(--fs-option);
    font-weight: 700;
    color: var(--dark);
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    text-align: left;
    width: 100%;
  }

  .option:hover:not(.disabled) {
    border-color: var(--light);
    background: #b7e4c7;
    transform: translateY(-2px);
  }
  .option:active:not(.disabled) { transform: scale(0.98); }
  .option.disabled { cursor: default; }

  .option .letter {
    background: var(--mid);
    color: #fff;
    border-radius: 50%;
    width: var(--letter-size);
    height: var(--letter-size);
    min-width: var(--letter-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    font-weight: 900;
    flex-shrink: 0;
  }

  .option.correct         { background: #b7e4c7; border-color: var(--mid); }
  .option.correct .letter { background: var(--mid); }
  .option.wrong           { background: #fce4e4; border-color: var(--red); }
  .option.wrong   .letter { background: var(--red); }
  .option.dimmed          { opacity: 0.45; }

  /* FEEDBACK */
  .feedback-box {
    margin-top: clamp(14px, 3vw, 24px);
    padding: clamp(12px, 2.5vw, 18px) clamp(14px, 3vw, 24px);
    border-radius: 12px;
    font-size: var(--fs-feedback);
    font-weight: 700;
    display: none;
    gap: clamp(8px, 2vw, 12px);
    line-height: 1.5;
    align-items: flex-start;
  }
  .feedback-box.show { display: flex; }
  .feedback-box.ok   { background: #d8f3dc; color: #1b4332; }
  .feedback-box.err  { background: #fde8e8; color: #7b2020; }

  .feedback-icon {
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    flex-shrink: 0;
  }

  /* BOTAO PROXIMA */
  .btn-next {
    display: block;
    margin: clamp(18px, 4vw, 28px) auto 0;
    background: var(--mid);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: clamp(12px, 2.5vw, 16px) clamp(32px, 7vw, 52px);
    font-family: 'Nunito', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: 900;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    width: 100%;
    max-width: 320px;
  }
  .btn-next:hover  { background: #1b4332; transform: scale(1.04); }
  .btn-next:active { transform: scale(0.97); }

  /* RESULTADO */
  #screen-result {
    text-align: center;
    color: var(--white);
    animation: fadeIn 0.5s ease;
  }

  .result-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: clamp(28px, 6vw, 52px) clamp(20px, 5vw, 48px);
    margin-bottom: clamp(18px, 4vw, 28px);
    color: var(--dark);
  }

  .result-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: var(--fs-result-title);
    color: var(--mid);
    margin-bottom: 12px;
  }

  .score-number {
    font-size: var(--fs-score);
    font-weight: 900;
    color: var(--mid);
    line-height: 1;
    margin: 10px 0;
  }

  .score-sub {
    font-size: clamp(0.95rem, 2.8vw, 1.4rem);
    color: #555;
    margin-bottom: 16px;
    padding: 0 clamp(0px, 4vw, 20px);
  }

  .star-row { font-size: var(--fs-stars); margin-bottom: 8px; }

  /* GABARITO */
  .review-btn {
    background: transparent;
    border: 2px solid var(--mid);
    color: var(--mid);
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 16px;
    transition: all 0.2s;
  }
  .review-btn:hover { background: var(--mid); color: #fff; }

  #review-list { text-align: left; margin-top: 16px; }

  .review-item {
    border-left: 4px solid;
    border-radius: 0 10px 10px 0;
    padding: clamp(8px, 2vw, 12px) clamp(10px, 2.5vw, 16px);
    margin-bottom: 10px;
    font-size: clamp(0.85rem, 2.2vw, 1rem);
    line-height: 1.5;
  }
  .review-item.ok-item  { background: #d8f3dc; border-color: var(--mid); }
  .review-item.err-item { background: #fde8e8; border-color: var(--red); }
  .review-item strong   { display: block; margin-bottom: 4px; font-size: clamp(0.9rem, 2.3vw, 1.05rem); }

  .btn-restart {
    background: var(--yellow);
    color: var(--dark);
    border: none;
    border-radius: 50px;
    padding: clamp(14px, 3vw, 18px) clamp(32px, 7vw, 52px);
    font-family: 'Nunito', sans-serif;
    font-size: clamp(1rem, 2.8vw, 1.4rem);
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .btn-restart:hover { transform: scale(1.05); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">

  <!-- TELA INICIAL -->
  <div id="screen-intro">
    <span class="squid-icon">🦑</span>
    <h1>Quiz de Ciências</h1>
    <p class="turma">7º Ano — Ensino Fundamental</p>
    <div class="intro-themes">
      <span class="theme-pill">🧬 Características dos Seres Vivos</span>
      <span class="theme-pill">🔬 Células</span>
      <span class="theme-pill">⚗️ Procarionte × Eucarionte</span>
      <span class="theme-pill">🌿 Célula Animal × Vegetal</span>
      <span class="theme-pill">🧫 Organelas Celulares</span>
    </div>
    <p class="prof-name">Prof. Pierre Penteado</p>
    <button class="btn-start" onclick="startQuiz()">▶ Iniciar Quiz</button>
  </div>

  <!-- TELA QUIZ -->
  <div id="screen-quiz" class="hidden">
    <div class="q-counter">
      <span id="q-counter-text">Questão 1 de 10</span>
      <span id="q-counter-score">0 acertos</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="card">
      <div class="q-label" id="q-label"></div>
      <div class="q-text"  id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback-box" id="feedback-box"></div>
      <button class="btn-next hidden" id="btn-next" onclick="nextQuestion()">Próxima →</button>
    </div>
  </div>

  <!-- TELA RESULTADO -->
  <div id="screen-result" class="hidden">
    <div class="result-card">
      <h2 id="result-title">Quiz Concluído! 🏆</h2>
      <div class="star-row"     id="stars"></div>
      <div class="score-number" id="score-display"></div>
      <div class="score-sub"    id="score-msg"></div>
      <button class="review-btn" onclick="toggleReview(this)">📋 Ver gabarito detalhado</button>
      <div id="review-list" class="hidden"></div>
    </div>
    <button class="btn-restart" onclick="restartQuiz()">🔄 Tentar Novamente</button>
  </div>

</div>
<script>
const questions = [
  {
    topic: "Características dos Seres Vivos",
    question: "Qual das seguintes características é EXCLUSIVA dos seres vivos em relação à matéria inanimada?",
    options: [
      "Possuir massa e ocupar espaço",
      "Realizar trocas de energia com o ambiente",
      "Apresentar organização celular e metabolismo",
      "Ser formado por átomos de carbono, hidrogênio e oxigênio"
    ],
    answer: 2,
    explanation: "Os seres vivos são organizados em células e realizam metabolismo. Matéria inanimada pode ter massa, trocar energia e conter os mesmos elementos, mas não possui organização celular nem metabolismo."
  },
  {
    topic: "Características dos Seres Vivos",
    question: "Pedro observou que um ser vivo cresce, se reproduz e reage a estímulos. Qual outra característica é igualmente essencial para classificar algo como ser vivo?",
    options: [
      "Ter cor verde devido à clorofila",
      "Realizar fotossíntese para obter energia",
      "Apresentar homeostase e evoluir ao longo das gerações",
      "Ter tamanho microscópico"
    ],
    answer: 2,
    explanation: "Homeostase (equilíbrio interno) e capacidade evolutiva são características fundamentais. Nem todo ser vivo é verde ou faz fotossíntese — animais e fungos não fazem —, e muitos são macroscópicos."
  },
  {
    topic: "Teoria Celular",
    question: "A teoria celular estabelece princípios fundamentais. Qual das afirmativas abaixo NÃO faz parte dessa teoria?",
    options: [
      "A célula é a unidade básica da vida",
      "Todo ser vivo é formado por uma ou mais células",
      "Toda célula origina-se de uma célula preexistente",
      "Células procariontes são mais complexas que as eucariontes"
    ],
    answer: 3,
    explanation: "A teoria celular tem três pilares: célula como unidade da vida, todo ser vivo é formado por células, e toda célula vem de outra célula. Afirmar que procariontes são mais complexas é falso — eucariontes possuem núcleo definido e organelas membranosas."
  },
  {
    topic: "Procarionte × Eucarionte",
    question: "Células PROCARIONTES diferem das EUCARIONTES principalmente porque:",
    options: [
      "Não possuem membrana plasmática",
      "Não possuem material genético",
      "Não possuem núcleo delimitado por membrana nuclear",
      "Não realizam respiração celular"
    ],
    answer: 2,
    explanation: "Células procariontes (como bactérias) não têm núcleo com membrana nuclear — o DNA fica disperso no citoplasma (nucleoide). Eucariontes têm núcleo bem definido. Ambas possuem membrana plasmática e material genético."
  },
  {
    topic: "Procarionte × Eucarionte",
    question: "As bactérias são exemplos de organismos procariontes. Qual organela celular as bactérias NÃO possuem?",
    options: [
      "Ribossomos",
      "Membrana plasmática",
      "Mitocôndrias",
      "Parede celular"
    ],
    answer: 2,
    explanation: "Bactérias não possuem mitocôndrias — organela exclusiva de células eucariontes. Produzem energia por processos na membrana plasmática. Possuem ribossomos, membrana plasmática e parede celular."
  },
  {
    topic: "Célula Animal × Vegetal",
    question: "A Célula X tinha núcleo, mitocôndrias e cloroplastos. A Célula Y tinha núcleo e mitocôndrias, mas nenhum cloroplasto. Qual a classificação correta?",
    options: [
      "X é animal e Y é vegetal",
      "X é procarionte e Y é eucarionte",
      "X é vegetal e Y é animal",
      "Ambas são procariontes"
    ],
    answer: 2,
    explanation: "Cloroplastos são exclusivos das células vegetais (e algas). A Célula X (com cloroplasto) é vegetal; a Célula Y (sem cloroplasto) é animal. Ambas são eucariontes por terem núcleo definido."
  },
  {
    topic: "Organelas — Vacúolo",
    question: "O VACÚOLO central das células vegetais tem papel fundamental. Qual é a sua principal função?",
    options: [
      "Realizar a fotossíntese armazenando clorofila",
      "Produzir energia por meio da respiração celular",
      "Armazenar água, nutrientes e manter a pressão de turgor",
      "Sintetizar proteínas para exportação"
    ],
    answer: 2,
    explanation: "O vacúolo central pode ocupar até 90% do volume celular vegetal. Armazena água, sais e açúcares, mantendo a pressão de turgor que dá rigidez à planta. Fotossíntese ocorre nos cloroplastos; energia nas mitocôndrias; proteínas nos ribossomos."
  },
  {
    topic: "Organelas — Mitocôndria",
    question: "A mitocôndria é conhecida como a 'usina de energia da célula'. Qual processo ocorre nessa organela?",
    options: [
      "Fotossíntese, transformando luz em glicose",
      "Respiração celular, transformando glicose em ATP",
      "Síntese de proteínas a partir do RNA",
      "Digestão intracelular de resíduos"
    ],
    answer: 1,
    explanation: "Na mitocôndria ocorre a respiração celular aeróbia, que quebra a glicose e produz ATP — a 'moeda energética' da célula. Fotossíntese ocorre nos cloroplastos; proteínas nos ribossomos; digestão intracelular nos lisossomos."
  },
  {
    topic: "Célula Animal × Vegetal",
    question: "Qual organela está presente na célula animal, mas AUSENTE na célula vegetal típica?",
    options: [
      "Ribossomo",
      "Mitocôndria",
      "Centríolo",
      "Retículo endoplasmático"
    ],
    answer: 2,
    explanation: "Os centríolos formam o fuso mitótico na divisão celular e estão presentes nas células animais. Células vegetais superiores geralmente não os possuem. Ribossomos, mitocôndrias e retículo endoplasmático estão em ambos os tipos."
  },
  {
    topic: "Classificação dos Seres Vivos",
    question: "Um ser vivo unicelular eucarionte tem núcleo e mitocôndrias, mas nenhuma parede celular nem cloroplasto. A qual grupo pertence?",
    options: [
      "Bactérias (Reino Monera)",
      "Fungos (Reino Fungi)",
      "Protistas animais (Protozoários)",
      "Plantas (Reino Plantae)"
    ],
    answer: 2,
    explanation: "O organismo é eucarionte, unicelular, sem parede celular e sem cloroplasto — característico de protozoários (ameba, paramécio), pertencentes aos Protistas. Bactérias são procariontes; fungos têm parede celular de quitina; plantas têm parede e cloroplastos."
  }
];

let current = 0, score = 0, answered = false;
let userAnswers = [];
const LETTERS = ['A','B','C','D'];

function startQuiz() {
  document.getElementById('screen-intro').classList.add('hidden');
  document.getElementById('screen-result').classList.add('hidden');
  document.getElementById('screen-quiz').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('q-counter-text').textContent  = `Questão ${current + 1} de ${total}`;
  document.getElementById('q-counter-score').textContent = `${score} acerto${score !== 1 ? 's' : ''}`;
  document.getElementById('progress-bar').style.width    = `${(current / total) * 100}%`;
  document.getElementById('q-label').textContent = `📌 ${q.topic}`;
  document.getElementById('q-text').textContent  = q.question;

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="letter">${LETTERS[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i, btn);
    optionsEl.appendChild(btn);
  });

  document.getElementById('feedback-box').className = 'feedback-box';
  document.getElementById('feedback-box').innerHTML  = '';
  document.getElementById('btn-next').classList.add('hidden');
}

function selectOption(index, el) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const allOptions = document.querySelectorAll('.option');
  allOptions.forEach(o => { o.classList.add('disabled'); o.disabled = true; });

  const correct = index === q.answer;
  if (correct) score++;
  userAnswers.push({ q, chosen: index, correct });

  if (correct) {
    el.classList.add('correct');
  } else {
    el.classList.add('wrong');
    allOptions[q.answer].classList.add('correct');
  }

  const fb = document.getElementById('feedback-box');
  fb.innerHTML = correct
    ? `<span class="feedback-icon">✅</span><span><strong>Correto!</strong> ${q.explanation}</span>`
    : `<span class="feedback-icon">❌</span><span><strong>Incorreto.</strong> A resposta certa é a <strong>${LETTERS[q.answer]}</strong>. ${q.explanation}</span>`;
  fb.className = `feedback-box show ${correct ? 'ok' : 'err'}`;

  document.getElementById('q-counter-score').textContent = `${score} acerto${score !== 1 ? 's' : ''}`;

  const btn = document.getElementById('btn-next');
  btn.classList.remove('hidden');
  btn.textContent = current + 1 < questions.length ? 'Próxima →' : 'Ver Resultado 🏆';
}

function nextQuestion() {
  current++;
  current < questions.length ? renderQuestion() : showResult();
}

function showResult() {
  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('hidden');
  document.getElementById('progress-bar').style.width = '100%';

  const total = questions.length;
  const pct   = score / total;
  document.getElementById('score-display').textContent = `${score} / ${total}`;

  const levels = [
    [1,         "Perfeito! Gabarito completo! 🎉",               "⭐⭐⭐⭐⭐"],
    [0.8,       "Excelente! Você dominou o conteúdo!",           "⭐⭐⭐⭐"],
    [0.6,       "Muito bem! Vale revisar alguns pontos.",         "⭐⭐⭐"],
    [0.4,       "Razoável. Revise o conteúdo!",                   "⭐⭐"],
    [-Infinity, "Não desanime! Revise as aulas e tente de novo.", "⭐"]
  ];
  const [, msg, stars] = levels.find(([t]) => pct >= t);
  document.getElementById('score-msg').textContent = msg;
  document.getElementById('stars').textContent     = stars;

  const rev = document.getElementById('review-list');
  rev.innerHTML = userAnswers.map((ua, i) =>
    `<div class="review-item ${ua.correct ? 'ok-item' : 'err-item'}">
      <strong>${i + 1}. ${ua.q.question}</strong>
      ${ua.correct
        ? `✅ Você acertou: <strong>${LETTERS[ua.chosen]}</strong>`
        : `❌ Você escolheu <strong>${LETTERS[ua.chosen]}</strong> · Correto: <strong>${LETTERS[ua.q.answer]}</strong>`}
      <br><em>${ua.q.explanation}</em>
    </div>`
  ).join('');
}

function toggleReview(btn) {
  const rev = document.getElementById('review-list');
  rev.classList.toggle('hidden');
  btn.textContent = rev.classList.contains('hidden')
    ? '📋 Ver gabarito detalhado'
    : '🙈 Ocultar gabarito';
}

function restartQuiz() {
  current = 0; score = 0; answered = false; userAnswers = [];
  document.getElementById('screen-result').classList.add('hidden');
  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('screen-intro').classList.remove('hidden');
}
</script>
</body>
</html>
