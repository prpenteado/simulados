<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Ciências – 6º Ano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --fs-title:        clamp(1.6rem, 5vw, 3rem);
    --fs-sub:          clamp(1rem, 3vw, 1.5rem);
    --fs-topic:        clamp(0.75rem, 2vw, 1rem);
    --fs-question:     clamp(1.1rem, 3.2vw, 1.85rem);
    --fs-option:       clamp(1rem, 2.6vw, 1.45rem);
    --fs-feedback:     clamp(0.9rem, 2.2vw, 1.25rem);
    --fs-btn:          clamp(1rem, 2.8vw, 1.6rem);
    --fs-counter:      clamp(0.85rem, 2vw, 1.1rem);
    --fs-score:        clamp(3rem, 10vw, 5rem);
    --fs-result-title: clamp(1.4rem, 4vw, 2.4rem);
    --fs-stars:        clamp(1.8rem, 5vw, 2.5rem);
    --card-pad:        clamp(20px, 4vw, 48px);
    --gap:             clamp(10px, 2vw, 16px);
    --letter-size:     clamp(34px, 6vw, 44px);
    --green-dark: #2d6a4f;
    --green-mid: #52b788;
    --green-light: #d8f3dc;
    --green-correct: #b7e4c7;
    --yellow: #f4d03f;
    --red-wrong: #fce4e4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1b2b22 0%, #2d6a4f 60%, #52b788 100%);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px 0;
  }

  /* ── TELA INICIAL ── */
  #screen-start {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    gap: clamp(14px, 3vw, 22px);
    padding: 40px 20px;
    width: 100%;
    max-width: min(980px, 100%);
  }

  .start-emoji {
    font-size: clamp(4rem, 12vw, 7rem);
    animation: float 3s ease-in-out infinite;
    line-height: 1;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-14px); }
  }

  .start-title {
    font-family: 'Playfair Display', serif;
    font-size: var(--fs-title);
    color: #fff;
    line-height: 1.15;
    text-shadow: 0 2px 16px rgba(0,0,0,0.22);
  }

  .start-sub {
    font-size: var(--fs-sub);
    font-weight: 700;
    color: rgba(255,255,255,0.88);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .pills-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 4px;
  }

  .pill {
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: clamp(0.78rem, 2.2vw, 1rem);
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 50px;
    backdrop-filter: blur(4px);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .start-teacher {
    font-size: clamp(0.8rem, 2vw, 1rem);
    color: rgba(255,255,255,0.6);
    font-weight: 400;
  }

  /* ── BARRA DE PROGRESSO ── */
  #progress-bar-area {
    display: none;
    width: 100%;
    max-width: min(980px, 100%);
    padding: clamp(16px, 3vw, 28px) clamp(12px, 3vw, 28px) 0;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-meta span {
    font-size: var(--fs-counter);
    font-weight: 700;
    color: rgba(255,255,255,0.92);
  }

  .progress-track {
    width: 100%;
    height: clamp(8px, 1.5vw, 12px);
    background: rgba(255,255,255,0.18);
    border-radius: 50px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--yellow);
    border-radius: 50px;
    transition: width 0.45s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── CARD DE QUESTÃO ── */
  #screen-quiz {
    display: none;
    width: 100%;
    max-width: min(980px, 100%);
    padding: clamp(14px, 3vw, 28px) clamp(12px, 3vw, 28px) 0;
  }

  .card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(44,106,79,0.13);
    padding: var(--card-pad);
  }

  .topic-label {
    font-size: var(--fs-topic);
    font-weight: 900;
    color: var(--green-dark);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: clamp(10px, 2vw, 16px);
  }

  .question-text {
    font-size: var(--fs-question);
    font-weight: 700;
    color: #1a2e1f;
    line-height: 1.45;
    margin-bottom: clamp(16px, 3vw, 28px);
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--gap);
    margin-bottom: clamp(16px, 3vw, 24px);
  }

  @media (min-width: 640px) {
    .options-grid { grid-template-columns: 1fr 1fr; }
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: clamp(10px, 2vw, 14px);
    background: var(--green-light);
    border: 2.5px solid transparent;
    border-radius: 14px;
    padding: clamp(10px, 2vw, 14px) clamp(12px, 2vw, 18px);
    cursor: pointer;
    text-align: left;
    transition: background 0.22s, border-color 0.22s, transform 0.15s;
    font-family: 'Nunito', sans-serif;
  }

  .option-btn:hover:not(:disabled) {
    background: #c3e6cb;
    transform: translateY(-2px);
  }

  .option-btn:disabled { cursor: default; }

  .option-btn.correct {
    background: var(--green-correct);
    border-color: #52b788;
  }

  .option-btn.wrong {
    background: var(--red-wrong);
    border-color: #e57373;
  }

  .letter-circle {
    min-width: var(--letter-size);
    width: var(--letter-size);
    height: var(--letter-size);
    border-radius: 50%;
    background: var(--green-dark);
    color: #fff;
    font-size: clamp(0.85rem, 2.2vw, 1.15rem);
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.22s;
  }

  .option-btn.wrong .letter-circle {
    background: #c0392b;
  }

  .option-text {
    font-size: var(--fs-option);
    font-weight: 700;
    color: #1a2e1f;
    line-height: 1.35;
  }

  /* ── FEEDBACK ── */
  .feedback-box {
    display: none;
    border-radius: 12px;
    padding: clamp(12px, 2.5vw, 18px) clamp(14px, 3vw, 22px);
    margin-bottom: clamp(14px, 3vw, 22px);
    font-size: var(--fs-feedback);
    font-weight: 700;
    line-height: 1.5;
    animation: fadein 0.3s ease;
  }

  @keyframes fadein { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  .feedback-box.correct-fb {
    background: #eafaf1;
    border: 2px solid #52b788;
    color: #1a6638;
  }

  .feedback-box.wrong-fb {
    background: #fdf3f3;
    border: 2px solid #e57373;
    color: #922b21;
  }

  /* ── BOTÕES ── */
  .btn-yellow, .btn-green {
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: var(--fs-btn);
    font-weight: 900;
    cursor: pointer;
    padding: clamp(12px, 2.5vw, 18px) clamp(28px, 5vw, 52px);
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    letter-spacing: 0.02em;
  }

  .btn-yellow {
    background: var(--yellow);
    color: #1a2e1f;
    box-shadow: 0 4px 20px rgba(244,208,63,0.35);
  }

  .btn-yellow:hover { filter: brightness(1.07); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(244,208,63,0.45); }

  .btn-green {
    background: var(--green-dark);
    color: #fff;
    box-shadow: 0 4px 20px rgba(44,106,79,0.25);
  }

  .btn-green:hover { filter: brightness(1.12); transform: translateY(-2px); }

  #btn-next {
    display: none;
    margin-top: 4px;
  }

  /* ── TELA DE RESULTADO ── */
  #screen-result {
    display: none;
    width: 100%;
    max-width: min(980px, 100%);
    padding: clamp(20px, 4vw, 40px) clamp(12px, 3vw, 28px);
  }

  .result-card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(44,106,79,0.13);
    padding: var(--card-pad);
    text-align: center;
  }

  .result-stars {
    font-size: var(--fs-stars);
    margin-bottom: 8px;
    animation: fadein 0.5s ease;
  }

  .result-score {
    font-family: 'Playfair Display', serif;
    font-size: var(--fs-score);
    color: var(--green-dark);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }

  .result-title {
    font-size: var(--fs-result-title);
    font-weight: 900;
    color: #1a2e1f;
    margin-bottom: 18px;
  }

  .gabaret-toggle {
    background: none;
    border: 2px solid var(--green-dark);
    color: var(--green-dark);
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(0.9rem, 2.2vw, 1.1rem);
    font-weight: 700;
    padding: 9px 22px;
    cursor: pointer;
    margin-bottom: 14px;
    transition: background 0.2s, color 0.2s;
  }

  .gabaret-toggle:hover { background: var(--green-dark); color: #fff; }

  .gabaret-list {
    display: none;
    text-align: left;
    margin-bottom: 20px;
  }

  .gabaret-list.open { display: block; }

  .gabaret-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border-bottom: 1px solid #e8f5e9;
    padding: 10px 4px;
    font-size: clamp(0.85rem, 2vw, 1rem);
    color: #1a2e1f;
  }

  .gabaret-item:last-child { border-bottom: none; }

  .gabaret-num {
    font-weight: 900;
    color: var(--green-dark);
    min-width: 28px;
  }

  .gabaret-icon { font-size: 1.1em; min-width: 22px; }

  .gabaret-text { font-weight: 700; flex: 1; line-height: 1.4; }

  .gabaret-text span { display: block; font-weight: 400; color: #555; font-size: 0.93em; margin-top: 2px; }
</style>
</head>
<body>

<!-- TELA INICIAL -->
<section id="screen-start">
  <div class="start-emoji">🌍</div>
  <h1 class="start-title">Quiz de Ciências</h1>
  <p class="start-sub">1º Simulado</p>
  <div class="pills-wrap">
    <span class="pill">Terra Primitiva</span>
    <span class="pill">Formato da Terra</span>
    <span class="pill">Movimentos da Terra</span>
  </div>
  <button class="btn-yellow" onclick="startQuiz()">▶ Iniciar Quiz</button>
  <p class="start-teacher">Prof. Pierre &nbsp;·&nbsp; Ciências – 6º Ano &nbsp;·&nbsp; Turma</p>
</section>

<!-- BARRA DE PROGRESSO -->
<div id="progress-bar-area">
  <div class="progress-meta">
    <span id="counter-label">Questão 1 de 10</span>
    <span id="score-label">0 acertos</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<!-- TELA QUIZ -->
<section id="screen-quiz">
  <div class="card">
    <p class="topic-label" id="q-topic"></p>
    <p class="question-text" id="q-text"></p>
    <div class="options-grid" id="options-grid"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button class="btn-green" id="btn-next" onclick="nextQuestion()">Próxima ▶</button>
  </div>
</section>

<!-- TELA RESULTADO -->
<section id="screen-result">
  <div class="result-card">
    <div class="result-stars" id="result-stars"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-title" id="result-title"></div>
    <button class="gabaret-toggle" onclick="toggleGabaret()">📋 Ver Gabarito Comentado</button>
    <div class="gabaret-list" id="gabaret-list"></div>
    <button class="btn-yellow" onclick="restartQuiz()">🔄 Tentar Novamente</button>
  </div>
</section>

<script>
const QUESTIONS = [
  {
    topic: "📌 Terra Primitiva",
    question: "Como era o ar da Terra há muito, muito tempo atrás — cerca de 4 bilhões de anos?",
    options: [
      "Igual ao ar de hoje, cheio de oxigênio",
      "Cheio de gases como vapor d'água e gás carbônico, sem oxigênio",
      "Feito só de oxigênio e hidrogênio",
      "Não existia ar nenhum na Terra"
    ],
    answer: 1,
    feedback: "Antigamente, o ar da Terra não tinha oxigênio! Era cheio de vapor d'água, gás carbônico e outros gases. O oxigênio só apareceu bem depois, quando surgiram os primeiros seres vivos que faziam fotossíntese."
  },
  {
    topic: "📌 Terra Primitiva",
    question: "Como a Terra foi formada, há cerca de 4,5 bilhões de anos?",
    options: [
      "Os primeiros animais construíram a Terra aos poucos",
      "Pedaços de rocha e poeira que giravam pelo espaço foram se juntando até formar o planeta",
      "Meteoros trouxeram a Terra já pronta de outro lugar do universo",
      "Marte se quebrou ao meio e um pedaço virou a Terra"
    ],
    answer: 1,
    feedback: "A Terra foi formada por muitos pedacinhos de rocha e poeira que existiam no espaço. Esses pedaços foram se puxando e se juntando aos poucos, até formar um planeta grande e sólido."
  },
  {
    topic: "📌 Terra Primitiva",
    question: "Por que a Terra antiga era tão quente, cheia de vulcões e lava?",
    options: [
      "Porque o Sol era muito mais quente do que hoje",
      "Por causa dos choques com meteoritos e pelo calor que vinha de dentro do planeta",
      "Porque outros planetas jogavam lava na Terra",
      "Porque a Terra ficava dentro do Sol"
    ],
    answer: 1,
    feedback: "A Terra primitiva era muito quente por dois motivos: muitos meteoritos batiam nela o tempo todo, soltando calor, e o próprio interior do planeta também gerava muito calor. Por isso tinha tantos vulcões!"
  },
  {
    topic: "📌 Formato da Terra",
    question: "Qual é o formato real da Terra?",
    options: [
      "Uma bola perfeita e redonda igual a uma laranja",
      "Um cubo com bordas arredondadas",
      "Quase redonda, mas um pouquinho achatada no topo e na base",
      "Um ovo alongado"
    ],
    answer: 2,
    feedback: "A Terra parece uma bola, mas não é uma bola perfeita! Ela é um pouquinho achatada nos polos (no topo e na base) e um pouquinho mais gordinha na parte do meio, chamada equador. Esse formato tem um nome difícil: geoide."
  },
  {
    topic: "📌 Formato da Terra",
    question: "O que acontece durante um eclipse lunar que prova que a Terra é redonda?",
    options: [
      "A sombra da Terra na Lua aparece sempre em formato de círculo",
      "O Sol fica vermelho por causa da Terra",
      "A Lua some completamente por alguns minutos",
      "As estrelas ficam mais brilhantes no céu"
    ],
    answer: 0,
    feedback: "Quando a Terra passa na frente da Lua, ela faz uma sombra. Essa sombra tem formato de curva redonda — não importa o ângulo. Só uma coisa redonda faz uma sombra assim: a Terra!"
  },
  {
    topic: "📌 Formato da Terra",
    question: "Quando um navio vai se afastando no mar, a gente vê ele desaparecer aos poucos, começando pela parte de baixo. Por que isso acontece?",
    options: [
      "O navio vai afundando devagar",
      "A Terra é curva, então a barriga dela vai escondendo o navio aos poucos",
      "A neblina cobre a parte de baixo do navio",
      "Nossos olhos não conseguem enxergar coisas muito longe"
    ],
    answer: 1,
    feedback: "Como a Terra é curva (redonda), quando o navio se afasta, a \"barriga\" da Terra vai subindo e escondendo o navio de baixo para cima. Primeiro some o casco e por último a chaminé. Isso mostra que a Terra é redonda!"
  },
  {
    topic: "📌 Movimentos da Terra",
    question: "O que é o movimento de rotação da Terra?",
    options: [
      "A Terra girando ao redor do Sol",
      "A Terra girando ao redor da Lua",
      "A Terra girando em volta de si mesma, como um pião",
      "A Terra parada enquanto o Sol se move"
    ],
    answer: 2,
    feedback: "Rotação é quando a Terra gira em volta de si mesma, igual a um pião. Esse giro leva 24 horas — ou seja, um dia! É por isso que temos dia e noite: o lado virado para o Sol fica claro, e o outro lado fica escuro."
  },
  {
    topic: "📌 Movimentos da Terra",
    question: "Quanto tempo a Terra leva para dar uma volta completa ao redor do Sol?",
    options: [
      "24 horas (um dia)",
      "30 dias (um mês)",
      "365 dias (um ano)",
      "10 anos"
    ],
    answer: 2,
    feedback: "A Terra demora 365 dias para dar uma volta completa ao redor do Sol — é exatamente isso que chamamos de um ano! Na verdade são 365 dias e algumas horas a mais. Essas horas se acumulam e, a cada 4 anos, colocamos um dia extra no calendário: o ano bissexto."
  },
  {
    topic: "📌 Movimentos da Terra",
    question: "Por que temos as estações do ano: verão, outono, inverno e primavera?",
    options: [
      "Porque a Terra fica mais perto ou mais longe do Sol em cada época",
      "Porque o eixo da Terra é inclinado e, ao redor do Sol, cada parte recebe mais ou menos luz",
      "Porque a Terra gira mais devagar em alguns meses",
      "Porque a Lua muda de posição a cada três meses"
    ],
    answer: 1,
    feedback: "A Terra é inclinada (como se estivesse um pouquinho tombada). Quando ela dá a volta no Sol, essa inclinação faz com que cada parte do planeta receba mais luz do Sol em alguns meses e menos luz em outros. Aí surgem as estações!"
  },
  {
    topic: "📌 Movimentos da Terra",
    question: "Quando no Brasil é verão e está calor, o que acontece nos países do hemisfério norte, como a Alemanha?",
    options: [
      "Também é verão lá, faz calor do mesmo jeito",
      "Está na primavera, com um mês de diferença",
      "É inverno lá, está frio",
      "É outono lá"
    ],
    answer: 2,
    feedback: "Quando o Brasil tem verão, a Alemanha e outros países do norte têm inverno! Isso acontece porque as estações são ao contrário nos dois lados da Terra. Quando um lado está mais virado para o Sol (verão), o outro está mais de costas para ele (inverno)."
  }
];

let current = 0;
let score = 0;
let userAnswers = [];
let answered = false;

function startQuiz() {
  current = 0;
  score = 0;
  userAnswers = [];
  document.getElementById('screen-start').style.display = 'none';
  document.getElementById('progress-bar-area').style.display = 'block';
  document.getElementById('screen-quiz').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = QUESTIONS[current];
  document.getElementById('q-topic').textContent = q.topic;
  document.getElementById('q-text').textContent = q.question;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="letter-circle">${letters[i]}</span><span class="option-text">${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    grid.appendChild(btn);
  });

  const fb = document.getElementById('feedback-box');
  fb.style.display = 'none';
  fb.className = 'feedback-box';
  fb.innerHTML = '';
  document.getElementById('btn-next').style.display = 'none';

  const pct = (current / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('counter-label').textContent = `Questão ${current + 1} de ${QUESTIONS.length}`;
  document.getElementById('score-label').textContent = `${score} acerto${score !== 1 ? 's' : ''}`;
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[current];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = idx === q.answer;
  if (isCorrect) {
    btn.classList.add('correct');
    score++;
  } else {
    btn.classList.add('wrong');
    buttons[q.answer].classList.add('correct');
  }

  userAnswers.push({ questionIdx: current, chosen: idx, correct: isCorrect });

  const fb = document.getElementById('feedback-box');
  fb.className = 'feedback-box ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = `${isCorrect ? '✅' : '❌'} ${isCorrect ? '<strong>Correto!</strong> ' : '<strong>Incorreto.</strong> '}${q.feedback}`;
  fb.style.display = 'block';

  document.getElementById('score-label').textContent = `${score} acerto${score !== 1 ? 's' : ''}`;
  document.getElementById('btn-next').style.display = 'inline-block';
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('progress-bar-area').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';

  const pct = score / QUESTIONS.length;
  let stars = '', title = '';
  if (pct === 1)        { stars = '⭐⭐⭐⭐⭐'; title = 'Perfeito! Você dominou o conteúdo!'; }
  else if (pct >= 0.8)  { stars = '⭐⭐⭐⭐'; title = 'Excelente! Muito bem!'; }
  else if (pct >= 0.6)  { stars = '⭐⭐⭐'; title = 'Bom! Continue estudando!'; }
  else if (pct >= 0.4)  { stars = '⭐⭐'; title = 'Pode melhorar — revise o conteúdo!'; }
  else                  { stars = '⭐'; title = 'Não desanime! Revise e tente de novo!'; }

  document.getElementById('result-stars').textContent = stars;
  document.getElementById('result-score').textContent = `${score} / 10`;
  document.getElementById('result-title').textContent = title;

  const list = document.getElementById('gabaret-list');
  list.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  QUESTIONS.forEach((q, i) => {
    const ua = userAnswers[i];
    const correct = ua && ua.correct;
    const item = document.createElement('div');
    item.className = 'gabaret-item';
    item.innerHTML = `
      <span class="gabaret-num">${i + 1}.</span>
      <span class="gabaret-icon">${correct ? '✅' : '❌'}</span>
      <span class="gabaret-text">
        Resposta correta: <strong>${letters[q.answer]}) ${q.options[q.answer]}</strong>
        <span>${q.feedback}</span>
      </span>`;
    list.appendChild(item);
  });
}

function toggleGabaret() {
  const list = document.getElementById('gabaret-list');
  list.classList.toggle('open');
  const btn = document.querySelector('.gabaret-toggle');
  btn.textContent = list.classList.contains('open') ? '🔼 Ocultar Gabarito' : '📋 Ver Gabarito Comentado';
}

function restartQuiz() {
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('gabaret-list').classList.remove('open');
  document.querySelector('.gabaret-toggle').textContent = '📋 Ver Gabarito Comentado';
  document.getElementById('screen-start').style.display = 'flex';
}
</script>
</body>
</html>
