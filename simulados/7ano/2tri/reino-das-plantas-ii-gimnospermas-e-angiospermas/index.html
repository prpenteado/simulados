<!DOCTYPE html>
<html lang='pt-BR'>
<head>
  <meta charset='UTF-8'/>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'/>
  <title>Reino das Plantas II: gimnospermas e angiospermas</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Open+Sans:wght@400&family=Playfair+Display:wght@700&display=swap' rel='stylesheet'>
  <style>
    :root{--fs-title:clamp(1.6rem,5vw,3rem);--fs-sub:clamp(1rem,3vw,1.5rem);--fs-topic:clamp(.75rem,2vw,1rem);--fs-question:clamp(1.1rem,3.2vw,1.85rem);--fs-option:clamp(1rem,2.6vw,1.45rem);--fs-feedback:clamp(.9rem,2.2vw,1.25rem);--fs-btn:clamp(1rem,2.8vw,1.6rem);--fs-counter:clamp(.85rem,2vw,1.1rem);--fs-score:clamp(3rem,10vw,5rem);--fs-result-title:clamp(1.4rem,4vw,2.4rem);--fs-stars:clamp(1.8rem,5vw,2.5rem);--card-pad:clamp(20px,4vw,48px);--gap:clamp(10px,2vw,16px);--letter-size:clamp(34px,6vw,44px)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:'Nunito',sans-serif;color:#1b2b22;background:linear-gradient(135deg,#1b2b22 0%,#2d6a4f 60%,#52b788 100%);padding:24px;display:flex;align-items:center;justify-content:center}button{font-family:inherit;cursor:pointer;border:0}.app{width:min(980px,100%);margin:auto}.screen{display:none}.screen.active{display:block}.start,.result{text-align:center;color:#fff;padding:18px 0}.emoji{font-size:clamp(4rem,8vw,5.4rem);line-height:1;margin-bottom:12px;animation:float 2.8s ease-in-out infinite}.emoji.small{font-size:3.5rem}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}} h1{margin:0;font-family:'Playfair Display',serif;font-size:var(--fs-title);line-height:1.08}.subtitle{margin:8px 0 0;font-size:var(--fs-sub);font-weight:700}.pills{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:20px auto}.pill{padding:8px 14px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.14);border-radius:999px;font-size:var(--fs-topic);font-weight:900;text-transform:uppercase;color:#fff}.teacher{margin:0 0 24px;font-size:1rem;opacity:.8;font-weight:700;color:#fff}.primary,.next{padding:14px 28px;border-radius:50px;font-size:var(--fs-btn);font-weight:900;box-shadow:0 10px 22px rgba(0,0,0,.18)}.primary{background:#f4d03f;color:#1b2b22}.next{background:#2d6a4f;color:#fff}.skip{background:transparent;color:#999;border:2px solid #999;border-radius:50px;padding:10px 18px;font-size:calc(var(--fs-btn)*.9);font-weight:900}.progress{margin:0 0 16px;color:#fff}.pinfo{display:flex;justify-content:space-between;gap:12px;font-size:var(--fs-counter);font-weight:900;margin-bottom:8px}.track{height:14px;border-radius:999px;background:rgba(255,255,255,.26);overflow:hidden}.bar{height:100%;width:0;background:#f4d03f;border-radius:999px;transition:.28s}.card{background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(44,106,79,.13);padding:var(--card-pad)}.topic{color:#2d6a4f;font-size:var(--fs-topic);font-weight:900;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}.qimg{margin:0 0 18px;border:2px solid #d8f3dc;border-radius:16px;background:#fff;overflow:hidden;display:none}.qimg.show{display:block}.qimg img{display:block;width:100%;height:auto;max-height:300px;object-fit:contain;background:#fff}.question{margin:0 0 22px;font-size:var(--fs-question);line-height:1.25;font-weight:900;color:#1b2b22}.opts{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap)} .opt{display:flex;align-items:center;gap:14px;width:100%;min-height:72px;padding:14px 16px;border-radius:16px;background:#d8f3dc;color:#1b2b22;text-align:left;border:3px solid transparent;font-family:'Open Sans',Arial,sans-serif;font-size:var(--fs-option);font-weight:400;line-height:1.25}.opt:disabled{cursor:default}.letter{flex:0 0 var(--letter-size);width:var(--letter-size);height:var(--letter-size);display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:#2d6a4f;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem}.opt.correct{background:#b7e4c7;border-color:#2d6a4f}.opt.wrong{background:#fce4e4;border-color:#d9534f}.opt.wrong .letter{background:#d9534f}.feedback{display:none;margin-top:18px;padding:16px 18px;border-radius:16px;font-size:var(--fs-feedback);line-height:1.45;font-weight:800}.feedback.show{display:block}.feedback.good{background:#e4f8e9;color:#1f6f46;border:2px solid #b7e4c7}.feedback.bad{background:#fff0f0;color:#9d2a28;border:2px solid #f3b3b3}.actions{display:flex;justify-content:flex-end;gap:12px;margin-top:22px;min-height:54px}.hidden{display:none!important}.score{font-size:var(--fs-score);font-weight:900;line-height:1;margin:10px 0;color:#f4d03f}.stars{font-size:var(--fs-stars);margin:12px 0}.rtitle{font-family:'Playfair Display',serif;font-size:var(--fs-result-title);margin:0 0 8px}.rmsg{margin:0 auto 22px;max-width:760px;font-size:var(--fs-sub);font-weight:700;line-height:1.35;color:#fff}.review{margin:20px auto 28px;text-align:left;color:#1b2b22;background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(44,106,79,.13);overflow:hidden;max-width:980px}details{border-bottom:1px solid #e5f4e8}details:last-child{border-bottom:0}summary{padding:16px 20px;font-weight:900;cursor:pointer;color:#2d6a4f;font-size:1rem;list-style-position:inside}.revbody{padding:0 20px 18px;font-size:.98rem;line-height:1.45}.tag{display:inline-flex;border-radius:999px;padding:4px 10px;font-size:.82rem;font-weight:900;margin-bottom:12px}.tag.ok{background:#e4f8e9;color:#1f6f46}.tag.no{background:#fff0f0;color:#9d2a28}.tag.skip{background:#eef1f2;color:#586066}.ans,.exp{margin-top:8px}.muted{opacity:.78}@media (max-width:640px){.opts{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class='app'>
  <section id='start' class='screen start active'>
    <div class='emoji'>🌲</div>
    <h1>Quiz de Ciências</h1>
    <p class='subtitle'>7º ano · Reino das Plantas II: gimnospermas e angiospermas</p>
    <div class='pills'><span class='pill'>10 questões</span><span class='pill'>3 primeiras com imagem</span><span class='pill'>TV / datashow</span></div>
    <p class='teacher'>Prof. Pierre Penteado</p>
    <button id='startBtn' class='primary'>▶ Iniciar Quiz</button>
  </section>
  <section id='quiz' class='screen'>
    <div class='progress'><div class='pinfo'><span id='qc'></span><span id='sc'></span></div><div class='track'><div id='bar' class='bar'></div></div></div>
    <article class='card'><div id='topic' class='topic'></div><div id='qimg' class='qimg'></div><h2 id='qtext' class='question'></h2><div id='opts' class='opts'></div><div id='fb' class='feedback'></div><div class='actions'><button id='skip' class='skip'>Pular ➜</button><button id='next' class='next hidden'>Próxima ➜</button></div></article>
  </section>
  <section id='result' class='screen result'><div class='emoji small'>🌿</div><h2 class='rtitle'>Resultado final</h2><div id='final' class='score'></div><div id='stars' class='stars'></div><p id='msg' class='rmsg'></p><div id='review' class='review'></div><button id='restart' class='primary'>🔄 Tentar Novamente</button></section>
</main>
<script>
const DATA = [{"topic": "Comparação entre grupos", "image": "img/q01.png", "q": "Observando a imagem, qual alternativa mostra corretamente a diferença principal entre gimnospermas e angiospermas?", "options": [["Nas gimnospermas a semente é nua; nas angiospermas a semente fica dentro do fruto.", 1], ["Gimnospermas têm frutos e angiospermas não.", 0], ["Angiospermas não produzem sementes.", 0], ["As duas sempre têm cones.", 0]], "explanation": "A diferença destacada é a localização da semente: nua nas gimnospermas e dentro do fruto nas angiospermas."}, {"topic": "Polinização", "image": "img/q02.png", "q": "Na imagem da polinização, a abelha ajuda principalmente a transportar:", "options": [["o pólen de uma flor para outra.", 1], ["a raiz de uma planta para outra.", 0], ["o fruto para o solo.", 0], ["a água do solo para a flor.", 0]], "explanation": "A polinização acontece quando o pólen é transportado, muitas vezes por animais como as abelhas."}, {"topic": "Sementes e frutos", "image": "img/q03.png", "q": "De acordo com a imagem, nas angiospermas as sementes ficam:", "options": [["dentro dos frutos.", 1], ["expostas no cone.", 0], ["somente no caule.", 0], ["misturadas ao solo.", 0]], "explanation": "Nas angiospermas, a semente se desenvolve protegida dentro do fruto."}, {"topic": "Exemplos", "image": "", "q": "Qual alternativa apresenta um exemplo de gimnosperma?", "options": [["Pinheiro.", 1], ["Roseira.", 0], ["Laranjeira.", 0], ["Feijoeiro.", 0]], "explanation": "O pinheiro é um exemplo clássico de gimnosperma."}, {"topic": "Exemplos", "image": "", "q": "Uma planta com flor e fruto pertence ao grupo das:", "options": [["angiospermas.", 1], ["gimnospermas.", 0], ["briófitas.", 0], ["pteridófitas.", 0]], "explanation": "Flores e frutos são características típicas das angiospermas."}, {"topic": "Reprodução", "image": "", "q": "A polinização é importante porque ajuda:", "options": [["na reprodução das plantas com flores.", 1], ["na formação do solo.", 0], ["na decomposição da matéria orgânica.", 0], ["na respiração dos animais.", 0]], "explanation": "A polinização participa do processo reprodutivo das plantas com flores."}, {"topic": "Sementes", "image": "", "q": "As gimnospermas recebem esse nome porque possuem:", "options": [["sementes nuas.", 1], ["sementes dentro do fruto.", 0], ["flores muito grandes.", 0], ["raízes aquáticas.", 0]], "explanation": "“Gimno” remete a nu: as sementes ficam expostas, sem fruto envolvendo."}, {"topic": "Estruturas", "image": "", "q": "Nas angiospermas, o fruto se forma a partir do:", "options": [["ovário da flor.", 1], ["caule.", 0], ["raiz.", 0], ["pólen.", 0]], "explanation": "Após a fecundação, o ovário da flor se desenvolve e forma o fruto."}, {"topic": "Dispersão", "image": "", "q": "Os frutos podem ajudar principalmente na:", "options": [["dispersão das sementes.", 1], ["produção de clorofila.", 0], ["fixação da planta ao solo.", 0], ["absorção de água pela raiz.", 0]], "explanation": "Muitos frutos ajudam a proteger e dispersar as sementes."}, {"topic": "Resumo", "image": "", "q": "Qual frase resume corretamente o conteúdo?", "options": [["Gimnospermas têm sementes nuas e angiospermas têm flores, frutos e sementes protegidas.", 1], ["Gimnospermas produzem frutos carnosos e angiospermas não.", 0], ["Angiospermas não têm flores.", 0], ["Gimnospermas são plantas sem sementes.", 0]], "explanation": "Essa frase resume corretamente as diferenças estudadas entre os dois grupos."}];
let qs=[], cur=0, score=0, answered=false, answers=[];
const $ = id => document.getElementById(id);
function screen(id){['start','quiz','result'].forEach(x => $(x).classList.remove('active')); $(id).classList.add('active');}
function startQuiz(){qs=DATA.map(q=>({...q}));cur=0;score=0;answered=false;answers=[];screen('quiz');renderQuestion();}
function renderQuestion(){const q=qs[cur];answered=false;$('qc').textContent=`Questão ${cur+1} de ${qs.length}`;$('sc').textContent=`${score} ${score===1?'acerto':'acertos'}`;$('bar').style.width=`${(cur/qs.length)*100}%`;$('topic').textContent=`📌 ${q.topic}`;$('qtext').textContent=q.q;if(q.image){$('qimg').innerHTML=`<img src="${q.image}" alt="Imagem da questão">`; $('qimg').classList.add('show');} else {$('qimg').innerHTML='';$('qimg').classList.remove('show');}$('opts').innerHTML='';$('fb').className='feedback';$('fb').innerHTML='';$('skip').classList.remove('hidden');$('next').classList.add('hidden');['A','B','C','D'].forEach((letter,i)=>{const op=q.options[i];const btn=document.createElement('button');btn.className='opt';btn.innerHTML=`<span class="letter">${letter}</span><span>${op[0]}</span>`;btn.onclick=()=>chooseAnswer(i);$('opts').appendChild(btn);});}
function chooseAnswer(i){if(answered)return;answered=true;const q=qs[cur], selected=q.options[i], correct=q.options.find(op=>op[1]);if(selected[1])score++;answers[cur]={status:selected[1]?'correct':'wrong',selected:selected[0],correct:correct[0],question:q.q,topic:q.topic,explanation:q.explanation};[...$('opts').children].forEach((btn,idx)=>{btn.disabled=true;if(q.options[idx][1])btn.classList.add('correct');if(idx===i && !q.options[idx][1])btn.classList.add('wrong');});$('fb').className=`feedback show ${selected[1]?'good':'bad'}`;$('fb').innerHTML=selected[1]?`✅ <strong>Correto.</strong> ${q.explanation}`:`❌ <strong>Incorreto.</strong> ${q.explanation}`;$('skip').classList.add('hidden');$('next').classList.remove('hidden');$('sc').textContent=`${score} ${score===1?'acerto':'acertos'}`;}
function skipQuestion(){if(answered)return;const q=qs[cur], correct=q.options.find(op=>op[1]);answers[cur]={status:'skip',selected:'Não respondida',correct:correct[0],question:q.q,topic:q.topic,explanation:q.explanation};nextQuestion();}
function nextQuestion(){cur++; if(cur>=qs.length){showResult();} else {renderQuestion();}}
function makeStars(n,total){const r=n/total; let c=1; if(r>=.9)c=5; else if(r>=.75)c=4; else if(r>=.55)c=3; else if(r>=.35)c=2; return '★'.repeat(c)+'☆'.repeat(5-c);} 
function makeMessage(n,total){const r=n/total; if(r>=.9)return 'Excelente. Você domina bem os conceitos básicos deste conteúdo.'; if(r>=.75)return 'Muito bom. O essencial foi compreendido.'; if(r>=.55)return 'Bom começo. Vale revisar alguns pontos.'; if(r>=.35)return 'Atenção. É melhor retomar o conteúdo com calma.'; return 'Hora de revisar desde o começo e tentar novamente.';}
function showResult(){$('bar').style.width='100%';screen('result');$('final').textContent=`${score} / ${qs.length}`;$('stars').textContent=makeStars(score,qs.length);$('msg').textContent=makeMessage(score,qs.length);$('review').innerHTML=answers.map((a,i)=>{const statusText=a.status==='correct'?'✅ Acertou':a.status==='wrong'?'❌ Errou':'⏭️ Não respondida';const cls=a.status==='correct'?'ok':a.status==='wrong'?'no':'skip';return `<details><summary>Questão ${i+1} · ${a.topic}</summary><div class='revbody'><span class='tag ${cls}'>${statusText}</span><div><strong>Pergunta:</strong> ${a.question}</div><div class='ans'><strong>Sua resposta:</strong> ${a.selected}</div><div class='ans'><strong>Resposta correta:</strong> ${a.correct}</div><div class='exp muted'><strong>Explicação:</strong> ${a.explanation}</div></div></details>`;}).join('');}
$('startBtn').onclick=startQuiz; $('next').onclick=nextQuestion; $('skip').onclick=skipQuestion; $('restart').onclick=()=>screen('start');
</script>
</body>
</html>
