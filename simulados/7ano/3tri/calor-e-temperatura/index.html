<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calor e temperatura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Open+Sans:wght@400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--fs-title:clamp(1.6rem,5vw,3rem);--fs-sub:clamp(1rem,3vw,1.5rem);--fs-topic:clamp(.75rem,2vw,1rem);--fs-question:clamp(1.1rem,3.2vw,1.85rem);--fs-option:clamp(1rem,2.6vw,1.45rem);--fs-feedback:clamp(.9rem,2.2vw,1.25rem);--fs-btn:clamp(1rem,2.8vw,1.6rem);--fs-counter:clamp(.85rem,2vw,1.1rem);--fs-score:clamp(3rem,10vw,5rem);--fs-result-title:clamp(1.4rem,4vw,2.4rem);--fs-stars:clamp(1.8rem,5vw,2.5rem);--card-pad:clamp(20px,4vw,48px);--gap:clamp(10px,2vw,16px);--letter-size:clamp(34px,6vw,44px)}
*{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:'Nunito',sans-serif;color:#1b2b22;background:linear-gradient(135deg,#1b2b22 0%,#2d6a4f 60%,#52b788 100%);padding:10px;display:flex;align-items:flex-start;justify-content:center} button{font-family:inherit;cursor:pointer;border:0}.app{width:min(1500px,96vw);margin:auto}.screen{display:none}.screen.active{display:block}.start,.result{text-align:center;color:#fff;padding:18px 0}.emoji{font-size:clamp(4rem,8vw,5.4rem);line-height:1;margin-bottom:12px;animation:float 2.8s ease-in-out infinite}.emoji.small{font-size:3.5rem}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}} h1{margin:0;font-family:'Playfair Display',serif;font-size:var(--fs-title);line-height:1.08}.subtitle{margin:8px 0 0;font-size:var(--fs-sub);font-weight:700}.pills{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:20px auto}.pill{padding:8px 14px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.14);border-radius:999px;font-size:var(--fs-topic);font-weight:900;text-transform:uppercase;color:#fff}.teacher{margin:0 0 24px;font-size:1rem;opacity:.8;font-weight:700;color:#fff}.primary,.next{padding:14px 28px;border-radius:50px;font-size:var(--fs-btn);font-weight:900;box-shadow:0 10px 22px rgba(0,0,0,.18)}.primary{background:#f4d03f;color:#1b2b22}.next{background:#2d6a4f;color:#fff}.skip{background:transparent;color:#999;border:2px solid #999;border-radius:50px;padding:10px 18px;font-size:calc(var(--fs-btn)*.9);font-weight:900}.progress{margin:0 0 16px;color:#fff}.pinfo{display:flex;justify-content:space-between;gap:12px;font-size:var(--fs-counter);font-weight:900;margin-bottom:8px}.track{height:14px;border-radius:999px;background:rgba(255,255,255,.26);overflow:hidden}.bar{height:100%;width:0;background:#f4d03f;border-radius:999px;transition:.28s}.card{background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(44,106,79,.13);padding:var(--card-pad)}.topic{color:#2d6a4f;font-size:var(--fs-topic);font-weight:900;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}.qimg{margin:0 0 18px;border:2px solid #d8f3dc;border-radius:16px;background:#fff;overflow:hidden;display:none}.qimg.show{display:block}.qimg img{display:block;width:100%;height:auto;max-height:300px;object-fit:contain;background:#fff}.question{margin:0 0 22px;font-size:var(--fs-question);line-height:1.25;font-weight:900;color:#1b2b22}.opts{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap)} .opt{display:flex;align-items:center;gap:14px;width:100%;min-height:72px;padding:14px 16px;border-radius:16px;background:#d8f3dc;color:#1b2b22;text-align:left;border:3px solid transparent;font-family:'Open Sans',Arial,sans-serif;font-size:var(--fs-option);font-weight:400;line-height:1.25}.opt:disabled{cursor:default}.letter{flex:0 0 var(--letter-size);width:var(--letter-size);height:var(--letter-size);display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:#2d6a4f;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem}.opt.correct{background:#b7e4c7;border-color:#2d6a4f}.opt.wrong{background:#fce4e4;border-color:#d9534f}.opt.wrong .letter{background:#d9534f}.feedback{display:none;margin-top:18px;padding:16px 18px;border-radius:16px;font-size:var(--fs-feedback);line-height:1.45;font-weight:800}.feedback.show{display:block}.feedback.good{background:#e4f8e9;color:#1f6f46;border:2px solid #b7e4c7}.feedback.bad{background:#fff0f0;color:#9d2a28;border:2px solid #f3b3b3}.actions{display:flex;justify-content:flex-end;gap:12px;margin-top:22px;min-height:54px}.hidden{display:none!important}.score{font-size:var(--fs-score);font-weight:900;line-height:1;margin:10px 0;color:#f4d03f}.stars{font-size:var(--fs-stars);margin:12px 0}.rtitle{font-family:'Playfair Display',serif;font-size:var(--fs-result-title);margin:0 0 8px}.rmsg{margin:0 auto 22px;max-width:760px;font-size:var(--fs-sub);font-weight:700;line-height:1.35;color:#fff}.review{margin:20px auto 28px;text-align:left;color:#1b2b22;background:#fff;border-radius:18px;box-shadow:0 8px 32px rgba(44,106,79,.13);overflow:hidden;max-width:980px}details{border-bottom:1px solid #e5f4e8}details:last-child{border-bottom:0}summary{padding:16px 20px;font-weight:900;cursor:pointer;color:#2d6a4f;font-size:1rem;list-style-position:inside}.revbody{padding:0 20px 18px;font-size:.98rem;line-height:1.45}.tag{display:inline-flex;border-radius:999px;padding:4px 10px;font-size:.82rem;font-weight:900;margin-bottom:12px}.tag.ok{background:#e4f8e9;color:#1f6f46}.tag.no{background:#fff0f0;color:#9d2a28}.tag.skip{background:#eef1f2;color:#586066}.ans,.exp{margin-top:8px}.muted{opacity:.78}@media (max-width:640px){.opts{grid-template-columns:1fr}}

/* TV_PATCH_150 */
@media (min-width:900px){
  body{
    padding:10px max(18px,4vw);
    align-items:flex-start;
  }

  .app{
    width:min(1500px,92vw);
    margin:18px auto;
  }

  .progress{
    margin:0 0 10px;
  }

  .pinfo{
    font-size:clamp(1rem,1.55vw,1.25rem);
  }

  .track{
    height:14px;
  }

  .card{
    width:100%;
    border-radius:22px;
    padding:clamp(42px,4.4vw,62px);
  }

  .topic{
    font-size:clamp(1.1rem,1.9vw,1.45rem);
    margin-bottom:22px;
    letter-spacing:.09em;
  }

  .question{
    font-size:clamp(2rem,3.45vw,3rem);
    line-height:1.18;
    margin-bottom:34px;
  }

  .qimg{
    margin-bottom:24px;
  }

  .qimg img{
    max-height:min(620px,48vh);
  }

  .opts{
    gap:22px;
  }

  .opt{
    min-height:122px;
    padding:26px 32px;
    border-radius:18px;
    gap:22px;
    font-size:clamp(1.6rem,2.8vw,2.2rem);
    line-height:1.24;
  }

  .letter{
    width:62px;
    height:62px;
    flex:0 0 62px;
    font-size:1.35rem;
  }

  .actions{
    margin-top:26px;
  }

  .skip,.next{
    font-size:clamp(1.2rem,2vw,1.55rem);
    padding:12px 24px;
  }

  .feedback{
    font-size:clamp(1.2rem,2vw,1.55rem);
  }
}

@media (min-width:900px) and (max-height:760px){
  .app{
    width:min(1500px,92vw);
    margin:14px auto;
  }

  .card{
    padding:clamp(36px,4vw,54px);
  }

  .question{
    font-size:clamp(1.9rem,3.25vw,2.75rem);
    margin-bottom:28px;
  }

  .opt{
    min-height:112px;
    padding:22px 30px;
    font-size:clamp(1.5rem,2.65vw,2.05rem);
  }

  .qimg img{
    max-height:min(560px,44vh);
  }
}

</style>
</head>
<body>
<main class="app">
<section id="start" class="screen start active"><div class="emoji">🌡️</div><h1>Quiz de Ciências</h1><p class="subtitle">7º ano · Calor e temperatura</p><div class="pills"><span class="pill">10 questões</span><span class="pill">3 primeiras com imagem</span><span class="pill">TV / datashow</span></div><p class="teacher">Prof. Pierre Penteado</p><button id="startBtn" class="primary">▶ Iniciar Quiz</button></section>
<section id="quiz" class="screen"><div class="progress"><div class="pinfo"><span id="qc"></span><span id="sc"></span></div><div class="track"><div id="bar" class="bar"></div></div></div><article class="card"><div id="topic" class="topic"></div><div id="qimg" class="qimg"></div><h2 id="qtext" class="question"></h2><div id="opts" class="opts"></div><div id="fb" class="feedback"></div><div class="actions"><button id="skip" class="skip">Pular ➜</button><button id="next" class="next hidden">Próxima ➜</button></div></article></section>
<section id="result" class="screen result"><div class="emoji small">🌿</div><h2 class="rtitle">Resultado final</h2><div id="final" class="score"></div><div id="stars" class="stars"></div><p id="msg" class="rmsg"></p><div id="review" class="review"></div><button id="restart" class="primary">🔄 Tentar Novamente</button></section>
</main>
<script>
const DATA = [{"topic": "Temperatura", "image": "img/q01.png", "q": "Temperatura indica:", "options": [["o quão quente ou frio um corpo está.", 1], ["a quantidade de plantas de um bioma.", 0], ["a força de um músculo.", 0], ["o número de animais de uma floresta.", 0]], "explanation": "Temperatura indica o estado térmico de um corpo."}, {"topic": "Calor", "image": "img/q02.png", "q": "Calor é:", "options": [["energia térmica em trânsito entre corpos com temperaturas diferentes.", 1], ["a medida feita por uma régua.", 0], ["um tipo de ser vivo.", 0], ["o mesmo que massa.", 0]], "explanation": "Calor é a energia transferida devido à diferença de temperatura."}, {"topic": "Condução", "image": "img/q03.png", "q": "A condução térmica acontece com mais facilidade em:", "options": [["metais.", 1], ["madeira seca.", 0], ["isopor.", 0], ["borracha.", 0]], "explanation": "Metais são bons condutores de calor."}, {"topic": "Termômetro", "image": "", "q": "O instrumento usado para medir a temperatura é o:", "options": [["termômetro.", 1], ["microscópio.", 0], ["telescópio.", 0], ["estetoscópio.", 0]], "explanation": "O termômetro é usado para medir a temperatura."}, {"topic": "Trocas de calor", "image": "", "q": "Quando colocamos gelo em um copo com água, o calor tende a passar:", "options": [["da água mais quente para o gelo mais frio.", 1], ["do gelo para a água mais quente.", 0], ["somente do ar para o copo.", 0], ["em nenhuma direção.", 0]], "explanation": "O calor passa espontaneamente do corpo mais quente para o mais frio."}, {"topic": "Sensação térmica", "image": "", "q": "Se um objeto está com temperatura maior que a da sua mão, ao tocá-lo você geralmente sente:", "options": [["calor passando para sua mão.", 1], ["frio saindo da sua mão para o objeto sempre.", 0], ["nenhuma troca de energia.", 0], ["o objeto ficando mais leve.", 0]], "explanation": "Quando o objeto está mais quente, o calor flui dele para sua mão."}, {"topic": "Isolantes", "image": "", "q": "Um material isolante térmico dificulta:", "options": [["a passagem de calor.", 1], ["a passagem da luz sempre.", 0], ["a produção de massa.", 0], ["o crescimento das plantas.", 0]], "explanation": "Materiais isolantes dificultam a transferência de calor."}, {"topic": "Equilíbrio térmico", "image": "", "q": "Quando dois corpos ficam na mesma temperatura após trocarem calor, ocorre:", "options": [["equilíbrio térmico.", 1], ["fotossíntese.", 0], ["polinização.", 0], ["combustão.", 0]], "explanation": "Equilíbrio térmico é quando os corpos atingem a mesma temperatura."}, {"topic": "Exemplo cotidiano", "image": "", "q": "Usar cabo de panela de material plástico ajuda porque ele:", "options": [["reduz a condução de calor para a mão.", 1], ["aumenta a temperatura do fogo.", 0], ["produz energia sozinho.", 0], ["transforma calor em luz.", 0]], "explanation": "O plástico é mau condutor, ajudando a proteger a mão do calor."}, {"topic": "Resumo", "image": "", "q": "Qual frase está correta?", "options": [["Temperatura mede o estado térmico; calor é energia transferida entre corpos.", 1], ["Calor e temperatura são exatamente a mesma coisa.", 0], ["Termômetro mede calor diretamente como massa.", 0], ["O calor sempre vai do corpo frio para o quente.", 0]], "explanation": "Essa frase resume corretamente a diferença entre calor e temperatura."}];
let qs=[], cur=0, score=0, answered=false, answers=[];
const $ = id => document.getElementById(id);
function screen(id){['start','quiz','result'].forEach(x => $(x).classList.remove('active')); $(id).classList.add('active');}
function startQuiz(){qs=DATA.map(q=>({...q}));cur=0;score=0;answered=false;answers=[];screen('quiz');renderQuestion();}
function renderQuestion(){const q=qs[cur];answered=false;$('qc').textContent=`Questão ${cur+1} de ${qs.length}`;$('sc').textContent=`${score} ${score===1?'acerto':'acertos'}`;$('bar').style.width=`${(cur/qs.length)*100}%`;$('topic').textContent=`📌 ${q.topic}`;$('qtext').textContent=q.q;if(q.image){$('qimg').innerHTML=`<img src="${q.image}" alt="Imagem da questão">`; $('qimg').classList.add('show');} else {$('qimg').innerHTML='';$('qimg').classList.remove('show');}$('opts').innerHTML='';$('fb').className='feedback';$('fb').innerHTML='';$('skip').classList.remove('hidden');$('next').classList.add('hidden');['A','B','C','D'].forEach((letter,i)=>{const op=q.options[i];const btn=document.createElement('button');btn.className='opt';btn.innerHTML=`<span class="letter">${letter}</span><span>${op[0]}</span>`;btn.onclick=()=>chooseAnswer(i);$('opts').appendChild(btn);});}
function chooseAnswer(i){if(answered)return;answered=true;const q=qs[cur], selected=q.options[i], correct=q.options.find(op=>op[1]);if(selected[1])score++;answers[cur]={status:selected[1]?'correct':'wrong',selected:selected[0],correct:correct[0],question:q.q,topic:q.topic,explanation:q.explanation};[...$('opts').children].forEach((btn,idx)=>{btn.disabled=true;if(q.options[idx][1])btn.classList.add('correct');if(idx===i && !q.options[idx][1])btn.classList.add('wrong');});$('fb').className=`feedback show ${selected[1]?'good':'bad'}`;$('fb').innerHTML=selected[1]?`✅ <strong>Correto.</strong> ${q.explanation}`:`❌ <strong>Incorreto.</strong> ${q.explanation}`;$('skip').classList.add('hidden');$('next').classList.remove('hidden');$('sc').textContent=`${score} ${score===1?'acerto':'acertos'}`;}
function skipQuestion(){if(answered)return;const q=qs[cur], correct=q.options.find(op=>op[1]);answers[cur]={status:'skip',selected:'Não respondida',correct:correct[0],question:q.q,topic:q.topic,explanation:q.explanation};nextQuestion();}
function nextQuestion(){cur++; if(cur>=qs.length){showResult();} else {renderQuestion();}}
function makeStars(n,total){const r=n/total; let c=1; if(r>=.9)c=5; else if(r>=.75)c=4; else if(r>=.55)c=3; else if(r>=.35)c=2; return '★'.repeat(c)+'☆'.repeat(5-c);} 
function makeMessage(n,total){const r=n/total; if(r>=.9)return 'Excelente. Você domina bem os conceitos básicos deste conteúdo.'; if(r>=.75)return 'Muito bom. O essencial foi compreendido.'; if(r>=.55)return 'Bom começo. Vale revisar alguns pontos.'; if(r>=.35)return 'Atenção. É melhor retomar o conteúdo com calma.'; return 'Hora de revisar desde o começo e tentar novamente.';}
function showResult(){$('bar').style.width='100%';screen('result');$('final').textContent=`${score} / ${qs.length}`;$('stars').textContent=makeStars(score,qs.length);$('msg').textContent=makeMessage(score,qs.length);$('review').innerHTML=answers.map((a,i)=>{const statusText=a.status==='correct'?'✅ Acertou':a.status==='wrong'?'❌ Errou':'⏭️ Não respondida';const cls=a.status==='correct'?'ok':a.status==='wrong'?'no':'skip';return `<details><summary>Questão ${i+1} · ${a.topic}</summary><div class='revbody'><span class='tag ${cls}'>${statusText}</span><div><strong>Pergunta:</strong> ${a.question}</div><div class='ans'><strong>Sua resposta:</strong> ${a.selected}</div><div class='ans'><strong>Resposta correta:</strong> ${a.correct}</div><div class='exp muted'><strong>Explicação:</strong> ${a.explanation}</div></div></details>`;}).join('');}
$('startBtn').onclick=startQuiz; $('next').onclick=nextQuestion; $('skip').onclick=skipQuestion; $('restart').onclick=()=>screen('start');
</script>
</body>
</html>
