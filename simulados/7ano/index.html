<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciências · 7º ano</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#1b2b22 0%,#2d6a4f 60%,#52b788 100%);min-height:100vh;padding:clamp(20px,4vw,48px);color:#f9fafb}
.wrap{max-width:1100px;margin:0 auto}header{text-align:center;margin-bottom:34px}
header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.3rem);margin-bottom:8px;text-shadow:0 2px 16px rgba(0,0,0,.28)}header p{opacity:.82;font-size:clamp(1rem,2vw,1.2rem)}
.panel{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;backdrop-filter:blur(5px)}
.card{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.12);border-radius:14px;padding:16px 18px;margin-top:12px;text-decoration:none;color:#fff;transition:.18s}
.card:hover{transform:translateX(4px);border-color:#f4d03f;background:rgba(255,255,255,0.14)}
.icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f4d03f;color:#1b2b22;font-size:1.4rem;font-weight:900;flex:0 0 48px}
.info strong{display:block;font-size:1.08rem}.info span{display:block;opacity:.75;font-size:.93rem;margin-top:3px}
.note{margin-top:24px;opacity:.78;text-align:center;line-height:1.5}.back{display:inline-block;margin-bottom:18px;color:#fff;text-decoration:none;opacity:.8;font-weight:900}
.back:hover{opacity:1}
</style>
</head>
<body>
<div class="wrap">
<a class="back" href="../../index.html">← voltar</a>
<header><h1>🌿 Ciências · 7º ano</h1><p>Ano completo fechado</p></header>
<div class="panel">
      <a class="card" href="1tri/">
        <div class="icon">📚</div>
        <div class="info"><strong>1º trimestre</strong><span>7 simulados completos</span></div>
      </a>

      <a class="card" href="2tri/">
        <div class="icon">📚</div>
        <div class="info"><strong>2º trimestre</strong><span>8 simulados completos</span></div>
      </a>

      <a class="card" href="3tri/">
        <div class="icon">📚</div>
        <div class="info"><strong>3º trimestre</strong><span>7 simulados completos</span></div>
      </a></div>
<p class="note">7º ano completo: 22 simulados prontos.</p>
</div>
</body>
</html>
